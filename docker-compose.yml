services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: bot_memory
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot_memory"]
      interval: 5s
      retries: 5

  memory-server:
    build:
      context: .
      dockerfile: memory-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://bot:bot@postgres:5432/bot_memory
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SSH_PRIVATE_KEY_B64
      - GPG_PRIVATE_KEY_B64
      - GH_TOKEN
      - GOOGLE_SA_KEY_B64
      - BOT_LABEL=${BOT_LABEL:-hcc-ai-framework}
      - BOT_MEMORY_URL=http://memory-server:8080/sse
    stdin_open: true
    tty: true
    depends_on:
      memory-server:
        condition: service_healthy
    command: >
      bash -c "
        echo $$SSH_PRIVATE_KEY_B64 | base64 -d > ~/.ssh/id_ed25519 &&
        chmod 600 ~/.ssh/id_ed25519 &&
        gpg --batch --import <(echo $$GPG_PRIVATE_KEY_B64 | base64 -d) 2>/dev/null &&
        git config --global user.signingkey $$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep ed25519 | head -1 | awk '{print $$2}' | cut -d/ -f2) &&
        echo $$GOOGLE_SA_KEY_B64 | base64 -d > ~/sa-key.json &&
        export GOOGLE_APPLICATION_CREDENTIALS=~/sa-key.json &&
        sed -i 's|http://localhost:8080/sse|'$$BOT_MEMORY_URL'|' .mcp.json &&
        gh config set git_protocol ssh --host github.com &&
        echo 'Keys loaded. Starting bot with label: '$$BOT_LABEL &&
        exec uv run dev-bot --label $$BOT_LABEL
      "

volumes:
  pgdata:
    name: memory-server_pgdata
    external: true
